<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I-Thrive Directory | Service Directory</title>
  <link rel="icon" type="image/x-icon" href="Photos/I-Thrive-logo.png">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Header injected -->
  <div id="site-header"></div>

  <main class="container wide">

    <div class="directory-layout">

      <!-- Filters -->
      <aside class="filters">
        <h2>Filters</h2>

        <label>
          i-THRIVE level
          <select id="filterThrive">
            <option value="">All</option>
            <option>Thriving</option>
            <option>Advice & Signposting</option>
            <option>Getting Help</option>
            <option>Getting More Help</option>
            <option>Risk Support</option>
          </select>
        </label>

        <label>
          Age range
          <select id="filterAge">
            <option value="">All</option>
            <option value="under 5s">Under 5's</option>
            <option value="primary school age">Primary School Age</option>
            <option value="secondary school age">Secondary School Age</option>
            <option value="post 16">Post 16</option>
            <option value="all ages">All ages</option>
          </select>
        </label>

        <label>
          Support category
          <select id="filterCategory">
            <option value="">All</option>
          </select>
        </label>

        <label>
          Exclusivity for schools
          <select id="filterSchool">
            <option value="">All</option>
            <option value="Y">Yes</option>
            <option value="N">No</option>
          </select>
        </label>

        <button id="resetFilters" class="secondary-btn">
          Reset filters
        </button>
      </aside>

      <!-- Results -->
      <section class="results">

        <p class="results-count" id="resultsCount">
          Showing 0 services
        </p>

        <div class="pagination-controls">
          <label>
            Items per page
            <select id="pageSize">
              <option value="10" selected>10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </label>
        </div>

        

        <ul class="service-list" id="serviceList">
          <!-- Services injected here -->
        </ul>
        <div id="pagination" class="pagination"></div>
      </section>

    </div>

  </main>

  <!-- Scripts -->
  <script src="Scripts/layout.js"></script>
  <script src="Scripts/directory.js"></script>

</body>
</html>
